<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Page</title>
</head>
<body>
    <center>
        <h1>Edit Info Page for Student Management App</h1>

        <form action="/update/{{student.roll}}" method="POST">
            {% csrf_token %}
            Name: <input type="text" name="name" value="{{student.name}}" > <br>
            Roll: <input type="text" name="roll" value="{{student.roll}}"> <br>
            Mob: <input type="text" name="mob" value="{{student.mob}}"> <br>

            <button style="background: green;"  type="submit"> Update Info </button>
            <br>
            <button> <a href="/about">Show Details</a></button>

        </form>
    </center>

</body>
</html>
